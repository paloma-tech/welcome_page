version: "3.8"

services:
  nextjs:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "bun install && bun run build && bun start"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: nextjsdb
      DB_USER: user
      DB_PASSWORD: superpowerfuldbpassword

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nextjsdb
      MYSQL_USER: user
      MYSQL_PASSWORD: superpowerfuldbpassword
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
